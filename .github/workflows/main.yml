name: Study Abroad Lead Generator

on:
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Scanner
        run: node index.js

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: leads
          path: output/leads.csv
